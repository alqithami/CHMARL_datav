services:
  - type: web
    name: chmarl-datav
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: STATIC_DIR
        value: dist
      - key: VITE_VESSEL_DATA_URL
        value: /api/vessels
      - key: VITE_CHMARL_EXPERIMENT_URL
        value: /api/chmarl/episode
      - key: VITE_PORT_EVENTS_URL
        value: /api/port-events
      - key: VITE_PORT_EVENTS_DEMO_ENABLED
        value: false
      - key: VITE_WEATHER_URL
        value: /api/weather
      - key: VITE_ALLOW_SAMPLE_DATA
        value: false
      - key: VITE_ALLOW_SAMPLE_CHMARL
        value: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: AISSTREAM_URL
        value: wss://stream.aisstream.io/v0/stream
      - key: AISSTREAM_BBOX
        value: 11,32;31,56
      - key: AISSTREAM_APPEND_SAUDI_PORT_BBOXES
        value: true
      - key: AISSTREAM_USE_SAUDI_PORT_BBOXES
        value: false
      - key: AISSTREAM_FILTER_TYPES
        value: ""
      - key: AISSTREAM_MAX_VESSELS
        value: 750
      - key: AISSTREAM_MAX_AGE_MS
        value: 21600000
      - key: AISSTREAM_TRAIL_POINTS
        value: 24
      - key: AISSTREAM_CACHE_ENABLED
        value: true
      - key: AISSTREAM_CACHE_FILE
        value: /tmp/chmarl-ais-cache.json
      - key: AISSTREAM_CACHE_FLUSH_MS
        value: 15000
      - key: CHMARL_RUNTIME_ENABLED
        value: true
      - key: ECOFAIR_EMISSION_BUDGET_TONNES_PER_DAY
        value: 0
      - key: ECOFAIR_BUDGET_TONNES_PER_VESSEL_PER_DAY
        value: 60
      - key: ECOFAIR_GAMMA_EMIS
        value: 10
      - key: ECOFAIR_GAMMA_FAIR
        value: 5
      - key: ECOFAIR_LAMBDA_LR
        value: 0.05
      - key: ECOFAIR_GINI_LIMIT
        value: 0.35
      - key: ECOFAIR_MINMAX_LIMIT
        value: 0.4
      - key: ECOFAIR_BERTH_RADIUS_NM
        value: 5
      - key: ECOFAIR_ANCHORAGE_RADIUS_NM
        value: 20
      - key: ECOFAIR_TICK_MS
        value: 60000
      - key: ECOFAIR_STATE_FILE
        value: /tmp/ecofair-state.json
      - key: CHMARL_FILE_ENABLED
        value: false
      - key: CHMARL_EXPERIMENT_URL
        sync: false
      - key: CHMARL_EXPERIMENT_TOKEN
        sync: false
      - key: CHMARL_INGEST_TOKEN
        sync: false
      - key: CHMARL_EXPERIMENT_FILE
        value: /tmp/chmarl_episode.json
      - key: PORT_EVENTS_URL
        sync: false
      - key: PORT_EVENTS_FILE_ENABLED
        value: false
      - key: PORT_EVENTS_FILE
        value: /tmp/port_events.json
      - key: WEATHER_URL
        sync: false
      - key: WEATHER_TOKEN
        sync: false
      - key: WEATHER_FILE_ENABLED
        value: false
      - key: WEATHER_FILE
        value: /tmp/weather.json
