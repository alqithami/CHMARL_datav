services:
  - type: web
    name: chmarl-datav
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8787
      - key: STATIC_DIR
        value: dist
      - key: VITE_VESSEL_DATA_URL
        value: /api/vessels
      - key: VITE_CHMARL_EXPERIMENT_URL
        value: /api/chmarl/episode
      - key: VITE_PORT_EVENTS_URL
        value: /api/port-events
      - key: VITE_WEATHER_URL
        value: /api/weather
      - key: VITE_ALLOW_SAMPLE_DATA
        value: false
      - key: VITE_ALLOW_SAMPLE_CHMARL
        value: false
      - key: AISSTREAM_API_KEY
        sync: false
      - key: AISSTREAM_USE_SAUDI_PORT_BBOXES
        value: true
      - key: AISSTREAM_BBOX
        value: 20.70,38.35;22.95,39.85|23.25,37.15;24.90,38.90|16.15,41.75;17.55,43.35|25.70,49.25;27.25,50.90|24.35,54.35;25.65,55.75|29.20,32.00;30.55,33.25
      - key: AISSTREAM_MAX_VESSELS
        value: 750
      - key: AISSTREAM_MAX_AGE_MS
        value: 21600000
      - key: AISSTREAM_TRAIL_POINTS
        value: 24
      - key: AISSTREAM_FILTER_TYPES
        value: PositionReport,StandardClassBPositionReport,ExtendedClassBPositionReport
      - key: AISSTREAM_CACHE_ENABLED
        value: true
      - key: AISSTREAM_CACHE_FILE
        value: /tmp/chmarl-ais-cache.json
      - key: AISSTREAM_CACHE_FLUSH_MS
        value: 15000
      - key: CHMARL_RUNTIME_ENABLED
        value: true
      - key: CHMARL_FILE_ENABLED
        value: false
      - key: CHMARL_EXPERIMENT_URL
        sync: false
      - key: CHMARL_EXPERIMENT_TOKEN
        sync: false
      - key: CHMARL_INGEST_TOKEN
        sync: false
      - key: CHMARL_EXPERIMENT_FILE
        value: /tmp/chmarl_episode.json
      - key: PORT_EVENTS_URL
        sync: false
      - key: PORT_EVENTS_FILE_ENABLED
        value: false
      - key: PORT_EVENTS_FILE
        value: /tmp/port_events.json
      - key: WEATHER_URL
        sync: false
      - key: WEATHER_TOKEN
        sync: false
      - key: WEATHER_FILE_ENABLED
        value: false
      - key: WEATHER_FILE
        value: /tmp/weather.json
